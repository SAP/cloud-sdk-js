version: 2
updates:
  # GitHub requires a unique combination of package-ecosystem, directory, and target-branch,
  # so production and dev dependencies must share one block. We use 'widen' for all deps
  # (ideally dev deps would use 'increase', but that would require a separate block).
  - package-ecosystem: npm
    target-branch: main
    directory: '/'
    schedule:
      interval: daily
      time: '01:00'
      timezone: 'Europe/Berlin'
    open-pull-requests-limit: 10
    cooldown:
      default-days: 4
    versioning-strategy: widen
    ignore:
      # yargs v18 needs ESM, see https://github.com/yargs/yargs/releases/tag/v18.0.0, we'll stay on v17 until we can use ESM
      - dependency-name: 'yargs'
        update-types: ['version-update:semver-major']
      # We only want to do major node updates on purpose, so don't create dependabot PRs for major versions
      - dependency-name: '@types/node'
        update-types: ['version-update:semver-major']
      # @stylistic/eslint-plugin v4 needs ESM, see https://github.com/eslint-stylistic/eslint-stylistic/releases/tag/v4.0.0, we'll stay on v3 until we can use ESM
      - dependency-name: '@stylistic/eslint-plugin'
        update-types: ['version-update:semver-major']
      # @manypkg/get-packages v3 needs ESM, see https://github.com/Thinkmill/manypkg/releases/tag/%40manypkg%2Fget-packages%403.0.0, we'll stay on v2 until we can use ESM
      - dependency-name: '@manypkg/get-packages'
        update-types: ['version-update:semver-major']
      # @apidevtools/json-schema-ref-parser v9 needs ESM, we'll stay on v8 until we can use ESM
      - dependency-name: '@apidevtools/json-schema-ref-parser'
        update-types: ['version-update:semver-major']
      # https-proxy-agent v6 needs ESM, we'll stay on v5 until we can use ESM
      - dependency-name: 'https-proxy-agent'
        update-types: ['version-update:semver-major']
  - package-ecosystem: 'github-actions'
    directories:
      - '/'
      - '/.github/actions/check-pr'
      - '/.github/actions/commit-and-tag'
      - '/.github/actions/changesets-fixed-version-bump'
      - '/.github/actions/merge-and-write-changelogs'
      - '/.github/actions/get-changelog'
      - '/.github/actions/setup'
      - '/.github/actions/check-public-api'
      - '/.github/actions/check-license'
    schedule:
      interval: 'weekly'
      time: '01:00'
      timezone: 'Europe/Berlin'
    cooldown:
      default-days: 4
    groups:
      codeql:
        patterns:
          - 'github/codeql-action/*'
