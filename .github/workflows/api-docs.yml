name: api-docs

on:
  workflow_call:
    inputs:
      version:
        description: 'Version to generate docs for'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to generate docs for'
        required: true
        type: string

jobs:
  generate-and-push-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
      
      - run: git fetch --depth=1
      
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'yarn'
      
      - run: yarn install --frozen-lockfile --ignore-engines
      
      - name: Generate API documentation
        run: |
          yarn generate
          yarn doc
      
      - name: Setup SSH key for cloud-sdk repo
        env:
          SSH_AUTH_SOCK: /tmp/ssh_agent.sock
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          echo "${{ secrets.GH_CLOUD_SDK_WRITE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          cat <<EOT >> ~/.ssh/config
          Host github.com
          HostName github.com
          IdentityFile ~/.ssh/id_rsa
          EOT
      
      - name: Push generated API documentation to cloud-sdk repo
        env:
          USE_SSH: true
          GIT_USER: cloud-sdk-js
        run: |
          git config --global user.email "cloud-sdk-js@github.com"
          git config --global user.name "cloud-sdk-js"
          
          # Use the version input parameter
          VERSION="${{ inputs.version }}"
          
          cd ..
          git clone --depth 1 git@github.com:SAP/cloud-sdk.git
          
          # Copy generated docs to versioned folder
          rsync -avz cloud-sdk-js/knowledge-base/api-reference/ cloud-sdk/static/api/${VERSION}/
          
          cd cloud-sdk
          git add -A
          git commit -m "Update SAP Cloud SDK for JavaScript API documentation ${VERSION}" || exit 0
          git push