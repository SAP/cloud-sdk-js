name: auto-dependabot-fix

on:
  pull_request_target: ~

jobs:
  building:
    if: github.actor == 'dependabot[bot]' && !github.event.pull_request.head.repo.fork
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.SAP_CLOUD_SDK_BOT_CLIENT_ID }}
          private-key: ${{ secrets.SAP_CLOUD_SDK_BOT_PRIVATE_KEY }}
          owner: SAP
          repositories: cloud-sdk-js
          permission-contents: write
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ steps.app-token.outputs.token }}
      - run: git fetch --depth=1
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'yarn'
      - name: Install Dependencies & Compile
        run: yarn install --frozen-lockfile --ignore-engines
      - name: Commit Changes if needed
        env:
          BOT_EMAIL: ${{ vars.SAP_CLOUD_SDK_BOT_EMAIL }}
          BOT_NAME: ${{ vars.SAP_CLOUD_SDK_BOT_NAME }}
        run: |
          diff=`git diff`
          if [ ! -z "$diff" ]; then
            git config --global user.email "$BOT_EMAIL"
            git config --global user.name "$BOT_NAME"
            git commit -m "Regenerate check-public-api action" -a
            git push
          fi
