name: auto-lint-fix

on:
  pull_request: ~

jobs:
  linting:
    if: github.actor != 'dependabot[bot]' && !github.event.pull_request.head.repo.fork
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.SAP_CLOUD_SDK_BOT_CLIENT_ID }}
          private-key: ${{ secrets.SAP_CLOUD_SDK_BOT_PRIVATE_KEY }}
          owner: SAP
          repositories: cloud-sdk-js
          permission-contents: write
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ steps.app-token.outputs.token }}
      - run: git fetch --depth=1
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'yarn'
      - name: Install Dependencies
        run: yarn install --frozen-lockfile --ignore-engines
      - name: Run Lint
        run: yarn lint:fix
      - name: Commit Changes if needed
        run: |
          diff=`git diff`
          if [ ! -z "$diff" ]; then
            git config --global user.email "cloud-sdk-js@github.com"
            git config --global user.name "cloud-sdk-js"
            git commit -m "Changes from lint:fix" -a
            git push
          fi
