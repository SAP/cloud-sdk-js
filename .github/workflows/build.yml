name: build

on:
  pull_request: ~
  push:
    branches: ['main']
    tags: ['v*']
    paths-ignore:
      - 'docs/**'
  workflow_call:
    inputs:
      canary-release-skip-checks:
        description: 'Release canary version (true skips tests and checks)'
        type: boolean
        required: false
        default: false
      # This allows cleanly separating this workflow_call from other event triggers
      is-workflow-call:
        description: 'Indicates that the workflow was triggered via workflow_call'
        type: boolean
        required: false
        default: false

jobs:
  tests:
    if: inputs.canary-release-skip-checks == false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: git fetch --depth=1
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'yarn'
      - run: yarn install --frozen-lockfile --ignore-engines
      - run: yarn test:unit
      - run: yarn test:integration
      - run: yarn test:self
      - run: yarn test:build-packages
      - run: yarn test:type
      - name: Slack Notify
        if: ${{ github.event_name != 'pull_request' && (failure() || cancelled()) }}
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_USERNAME: SDK Pipeline Bot
          SLACK_TITLE: Build tests ${{ job.status }} (${{ matrix.node-version }})
          SLACK_MESSAGE: 'Test failed'
          MSG_MINIMAL: event,actions url
          SLACK_COLOR: ${{ job.status }}
          SLACK_MSG_AUTHOR: ' '
          SLACK_ICON: https://sap.github.io/cloud-sdk/img/logo.png
        uses: rtCamp/action-slack-notify@e31e87e03dd19038e411e38ae27cbad084a90661 # v2.3.3

  checks:
    if: inputs.canary-release-skip-checks == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: git fetch --depth=1
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: 'yarn'
      - name: REUSE Compliance Check
        uses: fsfe/reuse-action@676e2d560c9a403aa252096d99fcab3e1132b0f5 # v6.0.0
      - run: yarn install --frozen-lockfile --ignore-engines
      - name: Static Code Check
        run: yarn lint
      - name: Test Service Version Check
        run: yarn check:test-service
      - name: Undeclared dependency Check
        run: yarn check:dependencies
      - name: Check public api
        uses: ./.github/actions/check-public-api
        with:
          force_internal_exports: 'true'
          excluded_packages: 'eslint-config, util, test-util'
      - name: Self tests for tools
        run: yarn test:self
      - name: Circular dependency Check
        run: yarn check:circular
      - name: API Doc Check
        run: yarn doc
      - name: License Check
        run: yarn check:license
      - name: Slack Notify
        if: ${{ github.event_name != 'pull_request' && (failure() || cancelled()) }}
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_USERNAME: SDK Pipeline Bot
          SLACK_TITLE: Build checks ${{ job.status }}
          SLACK_MESSAGE: 'Test failed'
          MSG_MINIMAL: event,actions url
          SLACK_COLOR: ${{ job.status }}
          SLACK_MSG_AUTHOR: ' '
          SLACK_ICON: https://sap.github.io/cloud-sdk/img/logo.png
        uses: rtCamp/action-slack-notify@e31e87e03dd19038e411e38ae27cbad084a90661 # v2.3.3

  e2e-tests:
    if: inputs.canary-release-skip-checks == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: git fetch --depth=1
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: 'yarn'
      - run: yarn install --frozen-lockfile --ignore-engines
      - run: yarn test:e2e

  dependabot:
    runs-on: ubuntu-latest
    if: ${{ github.actor == 'dependabot[bot]' && github.event_name == 'pull_request' }}
    needs: [tests, checks, e2e-tests]
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@ffa630c65fa7e0ecfa0625b5ceda64399aea1b36 # v3.0.0
        with:
          github-token: '${{ secrets.GITHUB_TOKEN }}'
      - name: Approve a PR
        if: ${{ steps.metadata.outputs.update-type != 'version-update:semver-major' }}
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
        run: gh pr review --approve "$PR_URL"
      - name: Enable auto-merge for Dependabot PRs
        if: ${{ steps.metadata.outputs.update-type != 'version-update:semver-major' }}
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
        run: gh pr merge --auto --squash "$PR_URL"
  canary-release-pre-check:
    if: inputs.is-workflow-call && inputs.canary-release-skip-checks == false
    runs-on: ubuntu-latest
    outputs:
      skip-release: ${{ steps.date-check.outputs.skip-release }}
    needs: [tests, checks, e2e-tests]
    env:
      REF_NAME: ${{ github.ref_name }}
      REF: ${{ github.ref }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: git fetch --depth=1
      - name: Check if latest commit is within 24 hrs
        id: date-check
        run: |
          lastCommitDate=$(git --no-pager log -n 1 "$REF_NAME" --pretty=format:"%at")
          curDate=$(date +%s)
          dateDiff=$(expr $curDate - $lastCommitDate)
          echo $lastCommitDate, $curDate, $dateDiff

          if [[ $dateDiff -gt 86400 ]]
          then
              echo "No new commit found on $REF within the last 24 hrs."
              echo "skip-release=true" >> $GITHUB_OUTPUT
          else
              echo "skip-release=false" >> $GITHUB_OUTPUT
          fi
  canary-release:
    # execute canary release if:
    # either the canary-release was scheduled and the canary-pre-check step resulted in skip-release=false
    # or the canary-release input is true
    if: always() && inputs.is-workflow-call && (needs.canary-release-pre-check.outputs.skip-release == 'false' || inputs.canary-release-skip-checks == true)
    runs-on: ubuntu-latest
    needs: [canary-release-pre-check]
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: git fetch --depth=1
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24 # Will install npm 11 needed for trusted publishing
          cache: 'yarn'
          registry-url: 'https://registry.npmjs.org'
      - run: yarn install --frozen-lockfile --ignore-engines
      - name: Canary Release
        run: |
          date=`date +%Y%m%d%H%M%S`
          rm -f .changeset/*.md
          cp canary-release-changeset.md .changeset
          yarn changeset pre enter ${date}
          yarn changeset version
          yarn changeset pre exit
          yarn changeset publish --tag canary
  draft-github-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [tests, checks]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: git fetch --depth=1
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: 'yarn'
      - run: yarn install --frozen-lockfile --ignore-engines
      - name: Get Changelog
        id: get-changelog
        uses: ./.github/actions/get-changelog
      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANGELOG: ${{ steps.get-changelog.outputs.changelog }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --verify-tag \
            --notes "$CHANGELOG" \
            --draft
