name: build

on:
  pull_request: ~
  push:
    branches: ['main']
    tags: ['v*']
    paths-ignore:
      - 'docs/**'
  workflow_call:
    inputs:
      canary-release-skip-checks:
        description: 'Release canary version (true skips tests and checks)'
        type: boolean
        required: false
        default: false
      # This allows cleanly separating this workflow_call from other event triggers
      is-workflow-call:
        description: 'Indicates that the workflow was triggered via workflow_call'
        type: boolean
        required: false
        default: false
    secrets:
      NPM_TOKEN_ARTIFACTORY:
        required: false
      SLACK_WEBHOOK:
        required: false

permissions: {}

jobs:
  tests:
    if: inputs.canary-release-skip-checks == false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]
    steps:
      - uses: sap/cloud-sdk-js/.github/actions/setup@davidkna-sap_artif-issues
        with:
          node-version: ${{ matrix.node-version }}
          registry-token: ${{ secrets.NPM_TOKEN_ARTIFACTORY }}
      - run: pnpm run test:unit
      - run: pnpm run test:integration
      - run: pnpm run test:self
      - run: pnpm run test:build-packages
      - run: pnpm run test:type
      - name: Slack Notify
        if: ${{ github.event_name != 'pull_request' && (failure() || cancelled()) }}
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_USERNAME: SDK Pipeline Bot
          SLACK_TITLE: Build tests ${{ job.status }} (${{ matrix.node-version }})
          SLACK_MESSAGE: 'Test failed'
          MSG_MINIMAL: event,actions url
          SLACK_COLOR: ${{ job.status }}
          SLACK_MSG_AUTHOR: ' '
          SLACK_ICON: https://sap.github.io/cloud-sdk/img/logo.png
        uses: rtCamp/action-slack-notify@33ca3be66c6f378fe1610fd1d5258632dbed5e58 # v2.4.0

  checks:
    if: inputs.canary-release-skip-checks == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: sap/cloud-sdk-js/.github/actions/setup@davidkna-sap_artif-issues
        with:
          registry-token: ${{ secrets.NPM_TOKEN_ARTIFACTORY }}
      - name: REUSE Compliance Check
        uses: fsfe/reuse-action@676e2d560c9a403aa252096d99fcab3e1132b0f5 # v6.0.0
      - name: Static Code Check
        run: pnpm run lint
      - name: Test Service Version Check
        run: pnpm run check:test-service
      - name: Undeclared dependency Check
        run: pnpm run check:dependencies
      - name: Check public api
        uses: ./.github/actions/check-public-api
        with:
          force_internal_exports: 'true'
          excluded_packages: 'eslint-config, util, test-util'
      - name: Self tests for tools
        run: pnpm run test:self
      - name: Circular dependency Check
        run: pnpm run check:circular
      - name: API Doc Check
        run: pnpm run doc
      - name: License Check
        uses: ./.github/actions/check-license
      - name: Slack Notify
        if: ${{ github.event_name != 'pull_request' && (failure() || cancelled()) }}
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_USERNAME: SDK Pipeline Bot
          SLACK_TITLE: Build checks ${{ job.status }}
          SLACK_MESSAGE: 'Test failed'
          MSG_MINIMAL: event,actions url
          SLACK_COLOR: ${{ job.status }}
          SLACK_MSG_AUTHOR: ' '
          SLACK_ICON: https://sap.github.io/cloud-sdk/img/logo.png
        uses: rtCamp/action-slack-notify@33ca3be66c6f378fe1610fd1d5258632dbed5e58 # v2.4.0

  npm-install:
    if: inputs.canary-release-skip-checks == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: sap/cloud-sdk-js/.github/actions/setup@davidkna-sap_artif-issues
        with:
          registry-url: 'https://registry.npmjs.org'
          skip-build: 'true'

  e2e-tests:
    if: inputs.canary-release-skip-checks == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: sap/cloud-sdk-js/.github/actions/setup@davidkna-sap_artif-issues
        with:
          registry-token: ${{ secrets.NPM_TOKEN_ARTIFACTORY }}
      - run: pnpm run test:e2e

  dependabot:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.user.login == 'dependabot[bot]' && github.repository == github.event.pull_request.head.repo.full_name }}
    needs: [tests, checks, e2e-tests]
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: '${{ secrets.GITHUB_TOKEN }}'
      - name: Approve a PR
        if: ${{ steps.metadata.outputs.update-type != 'version-update:semver-major' }}
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
        run: gh pr review --approve "$PR_URL"
      - name: Enable auto-merge for Dependabot PRs
        if: ${{ steps.metadata.outputs.update-type != 'version-update:semver-major' }}
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
        run: gh pr merge --auto --squash "$PR_URL"
  canary-release-pre-check:
    if: inputs.is-workflow-call && inputs.canary-release-skip-checks == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      skip-release: ${{ steps.date-check.outputs.skip-release }}
    needs: [tests, checks, e2e-tests]
    env:
      REF_NAME: ${{ github.ref_name }}
      REF: ${{ github.ref }}
    steps:
      - uses: sap/cloud-sdk-js/.github/actions/setup@davidkna-sap_artif-issues
        with:
          registry-token: ${{ secrets.NPM_TOKEN_ARTIFACTORY }}
      - name: Check if latest commit is within 24 hrs
        id: date-check
        run: |
          lastCommitDate=$(git --no-pager log -n 1 "$REF_NAME" --pretty=format:"%at")
          curDate=$(date +%s)
          dateDiff=$(( curDate - lastCommitDate ))
          echo "$lastCommitDate, $curDate, $dateDiff"

          if [[ $dateDiff -gt 86400 ]]
          then
              echo "No new commit found on $REF within the last 24 hrs."
              echo "skip-release=true" >> "$GITHUB_OUTPUT"
          else
              echo "skip-release=false" >> "$GITHUB_OUTPUT"
          fi

  canary-release:
    # execute canary release if:
    # either the canary-release was scheduled and the canary-pre-check step resulted in skip-release=false
    # or the canary-release input is true
    if: always() && inputs.is-workflow-call && (needs.canary-release-pre-check.outputs.skip-release == 'false' || inputs.canary-release-skip-checks == true)
    runs-on: ubuntu-latest
    needs: [canary-release-pre-check]
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: sap/cloud-sdk-js/.github/actions/setup@davidkna-sap_artif-issues
        with:
          persist-credentials: true
          node-version: 24 # Will install npm 11 needed for trusted publishing
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false
      - name: Canary Release
        run: |
          date=`date +%Y%m%d%H%M%S`
          rm -f .changeset/*.md
          cp canary-release-changeset.md .changeset
          pnpm changeset pre enter "${date}"
          pnpm changeset version
          pnpm changeset pre exit
          pnpm changeset publish --tag canary

  draft-github-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [tests, checks]
    permissions:
      contents: write
    steps:
      - uses: sap/cloud-sdk-js/.github/actions/setup@davidkna-sap_artif-issues
        with:
          registry-token: ${{ secrets.NPM_TOKEN_ARTIFACTORY }}
      - name: Get Changelog
        id: get-changelog
        uses: ./.github/actions/get-changelog
      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANGELOG: ${{ steps.get-changelog.outputs.changelog }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --verify-tag \
            --notes "$CHANGELOG" \
            --draft
