name: bump

on:
  workflow_dispatch:
    inputs:
      majorVersion:
        description: Mandatory, when bumping a major version. Semver compatible version string (X.Y.Z). Must not be set for patch and minor version releases.
        required: false

permissions: {}

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.SAP_CLOUD_SDK_BOT_CLIENT_ID }}
          private-key: ${{ secrets.SAP_CLOUD_SDK_BOT_PRIVATE_KEY }}
          owner: SAP
          repositories: cloud-sdk-js
          permission-contents: write
      - uses: sap/cloud-sdk-js/.github/actions/setup@davidkna-sap_artif-issues
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: 'main'
          persist-credentials: true
          registry-token: ${{ secrets.NPM_TOKEN_ARTIFACTORY }}

      - name: bump version
        id: bump
        uses: ./.github/actions/changesets-fixed-version-bump
        with:
          majorVersion: ${{ inputs.majorVersion }}

      - env:
          NEXT_PACKAGE_VERSION: ${{ steps.bump.outputs.version }}
        run: |
          pnpm ts-node ${{ github.workspace }}/scripts/update-documentation-md.ts
          pnpm generate

      - name: merge Changelogs
        id: merge-changelogs
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        uses: ./.github/actions/merge-and-write-changelogs

      - name: commit and tag
        uses: ./.github/actions/commit-and-tag
        with:
          version: ${{ steps.bump.outputs.version }}
          user-email: ${{ vars.SAP_CLOUD_SDK_BOT_EMAIL }}
          user-name: ${{ vars.SAP_CLOUD_SDK_BOT_NAME }}

  generate-api-docs:
    name: Generate and Push API Documentation
    needs: [bump]
    permissions:
      contents: read
    uses: ./.github/workflows/api-docs.yml
    secrets:
      NPM_TOKEN_ARTIFACTORY: ${{ secrets.NPM_TOKEN_ARTIFACTORY }}
      SAP_CLOUD_SDK_BOT_CLIENT_ID: ${{ secrets.SAP_CLOUD_SDK_BOT_CLIENT_ID }}
      SAP_CLOUD_SDK_BOT_PRIVATE_KEY: ${{ secrets.SAP_CLOUD_SDK_BOT_PRIVATE_KEY }}
    with:
      version: v${{ needs.bump.outputs.version }}
