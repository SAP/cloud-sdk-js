name: downloads

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1'

jobs:
  downloads:
    runs-on: ubuntu-latest
    steps:
      - uses: sap/cloud-sdk-js/.github/actions/setup@pnpm-setup
        with:
          registry-token: ${{ secrets.NPM_TOKEN_ARTIFACTORY }}
      - run: pnpm exec ts-node scripts/npm-stats.ts
        name: Download Stats
