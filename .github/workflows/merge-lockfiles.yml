name: merge-lockfiles

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.SAP_CLOUD_SDK_BOT_CLIENT_ID }}
          private-key: ${{ secrets.SAP_CLOUD_SDK_BOT_PRIVATE_KEY }}
          owner: SAP
          repositories: cloud-sdk-js
          permission-contents: write
      - uses: sap/cloud-sdk-js/.github/actions/setup@davidkna-sap_artif-issues
        with:
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true
          registry-token: ${{ secrets.NPM_TOKEN_ARTIFACTORY }}
          pnpm-install-args: '--merge-git-branch-lockfiles --lockfile-only'
          skip-build: true
      - name: Commit merged lockfile
        env:
          BOT_EMAIL: ${{ vars.SAP_CLOUD_SDK_BOT_EMAIL }}
          BOT_NAME: ${{ vars.SAP_CLOUD_SDK_BOT_NAME }}
        run: |
          diff=`git diff`
          if [ ! -z "$diff" ]; then
            git config --global user.email "$BOT_EMAIL"
            git config --global user.name "$BOT_NAME"
            git commit -m "chore: Merge git branch lockfiles" -a
            git push
          fi
