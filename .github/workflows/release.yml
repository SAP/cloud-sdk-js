name: release

on:
  workflow_call:

jobs:
  stable-release:
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: app-token
        with:
          client-id: ${{ secrets.SAP_CLOUD_SDK_BOT_CLIENT_ID }}
          private-key: ${{ secrets.SAP_CLOUD_SDK_BOT_PRIVATE_KEY }}
          owner: SAP
          repositories: cloud-sdk
      - uses: sap/cloud-sdk-js/.github/actions/setup@pnpm-setup
        with:
          ref: 'main'
          persist-credentials: true
          node-version: 24 # Will install npm 11 needed for trusted publishing
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false
      - name: Legacy Release
        if: startsWith(github.ref, 'refs/tags/v1') || startsWith(github.ref, 'refs/tags/v2') || startsWith(github.ref, 'refs/tags/v3')
        run: |
          pnpm changeset publish --tag legacy
      - name: Latest Release
        if: startsWith(github.ref, 'refs/tags/v4')
        run: |
          pnpm changeset publish
      - name: Checkout Docs
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: SAP/cloud-sdk
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0 # otherwise, there would be errors pushing refs to the destination repository.
          path: ./cloud-sdk
      - name: Update release notes
        run: |
          npx ts-node -e "import { addCurrentChangelog } from './scripts/add-changelog'; addCurrentChangelog()"
      - name: Open PR
        env:
          BOT_EMAIL: ${{ vars.SAP_CLOUD_SDK_BOT_EMAIL }}
          BOT_NAME: ${{ vars.SAP_CLOUD_SDK_BOT_NAME }}
        run: |

          git config user.email "$BOT_EMAIL"
          git config user.name "$BOT_NAME"

          cd cloud-sdk

          git checkout -b "update-release-notes"
          git commit -m "update release notes" -a
          git push -u origin update-release-notes

          PR_BODY="Auto-created by update release notes workflow."
          PR_TITLE="Update JS Release Notes"
          gh pr create --head "update-release-notes" --title "${PR_TITLE}" --body "${PR_BODY}"
