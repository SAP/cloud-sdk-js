name: windows-tests

on:
  push:
    branches: ['main']
    paths-ignore:
      - 'docs/**'
  workflow_dispatch:

jobs:
  tests:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - run: pnpm run test:unit
      - run: pnpm run test:integration
        if: always()
      - run: pnpm run test:self
      - run: pnpm run test:type
