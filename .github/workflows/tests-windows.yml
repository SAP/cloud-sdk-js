name: windows-tests

on:
  push:
    branches: ['main']
    paths-ignore:
      - 'docs/**'
  workflow_dispatch:

permissions: {}

jobs:
  tests:
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: sap/cloud-sdk-js/.github/actions/setup@davidkna-sap_rm-dev-en
        with:
          registry-token: ${{ secrets.NPM_TOKEN_ARTIFACTORY }}
      - run: pnpm run test:unit
      - if: always()
        run: pnpm run test:integration
      - run: pnpm run test:self
      - run: pnpm run test:type
