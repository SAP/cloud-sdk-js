name: typedoc-check

on:
  pull_request: ~
  push:
    branches: ['main']
    tags: ['v*']
    paths-ignore:
      - 'docs/**'

permissions: {}

jobs:
  tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: sap/cloud-sdk-js/.github/actions/setup@davidkna-sap_rm-dev-en
        with:
          registry-token: ${{ secrets.NPM_TOKEN_ARTIFACTORY }}
      - run: pnpm run doc
